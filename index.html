<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEMO MLF Tracker — NEM Generator Loss Factors</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root { --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a; --text: #e0e0e0; --muted: #888; --accent: #4472C4; --green: #63BE7B; --red: #F8696B; --yellow: #FFEB84; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }

  .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { padding: 8px 18px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); border-radius: 6px 6px 0 0; cursor: pointer; font-size: 0.9rem; transition: all 0.15s; }
  .tab:hover { color: var(--text); border-color: var(--accent); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .filters { display: flex; gap: 8px; align-items: center; margin-left: auto; }
  select, input[type="text"] { padding: 6px 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); border-radius: 4px; font-size: 0.85rem; }
  input[type="text"] { width: 200px; }

  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; max-height: 75vh; }
  table { border-collapse: collapse; width: 100%; font-size: 0.82rem; }
  th { background: var(--accent); color: #fff; padding: 8px 10px; text-align: center; position: sticky; top: 0; white-space: nowrap; z-index: 1; cursor: pointer; }
  th:first-child { text-align: center; width: 40px; cursor: default; }
  th:nth-child(2) { text-align: left; }
  th:hover { background: #3a62a4; }
  th:first-child:hover { background: var(--accent); }
  th.sorted-asc::after { content: " ▲"; }
  th.sorted-desc::after { content: " ▼"; }
  td { padding: 6px 10px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td:first-child { text-align: center; width: 40px; }
  td:nth-child(2) { text-align: left; font-weight: 500; }
  td:nth-child(3) { text-align: left; }
  tr:hover td { background: rgba(68,114,196,0.08); }
  tr.selected td { background: rgba(68,114,196,0.18); }

  .cb { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

  .mlf-cell { font-variant-numeric: tabular-nums; }
  .draft-header { background: #5a4a8a !important; }
  .draft-header:hover { background: #4a3a7a !important; }
  .draft-cell { border-left: 2px dashed #7b68ae; }
  .import-header { background: #4a6a3a !important; }
  .import-header:hover { background: #3a5a2a !important; }
  .change-pos { color: #63BE7B; }
  .change-neg { color: #F8696B; }
  .change-neutral { color: var(--muted); }

  .type-badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }
  .type-generator { background: rgba(99,190,123,0.15); color: #63BE7B; border: 1px solid rgba(99,190,123,0.3); }
  .type-network { background: rgba(100,160,240,0.15); color: #64a0f0; border: 1px solid rgba(100,160,240,0.3); }
  .type-interconnector { background: rgba(180,130,240,0.15); color: #b482f0; border: 1px solid rgba(180,130,240,0.3); }
  .type-scheduled { background: rgba(255,200,80,0.15); color: #ffc850; border: 1px solid rgba(255,200,80,0.3); }
  .type-customer { background: rgba(255,160,80,0.15); color: #ffa050; border: 1px solid rgba(255,160,80,0.3); }
  .type-unknown { background: rgba(136,136,136,0.15); color: var(--muted); border: 1px solid rgba(136,136,136,0.25); }
  .status-retired { opacity: 0.45; }
  .badge-retired { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 0.68rem; font-weight: 600; background: rgba(136,136,136,0.2); color: var(--muted); border: 1px solid rgba(136,136,136,0.3); margin-left: 5px; vertical-align: middle; letter-spacing: 0.03em; }

  .stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 18px; min-width: 140px; }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }
  .stat-value { font-size: 1.3rem; font-weight: 600; margin-top: 2px; }

  .actions { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .action-btn { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--accent); font-size: 0.85rem; cursor: pointer; transition: all 0.15s; }
  .action-btn:hover { background: var(--accent); color: #fff; }
  .action-btn:disabled { opacity: 0.4; cursor: default; }
  .action-btn:disabled:hover { background: var(--surface); color: var(--accent); }
  .sel-count { color: var(--muted); font-size: 0.85rem; }

  .downloads { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .dl-btn { display: inline-block; padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; color: var(--accent); text-decoration: none; font-size: 0.85rem; transition: all 0.15s; }
  .dl-btn:hover { background: var(--accent); color: #fff; }
  .footer { margin-top: 24px; color: var(--muted); font-size: 0.78rem; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .section-title { font-size: 1.1rem; margin: 24px 0 8px; color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<h1>AEMO MLF Tracker</h1>
<p class="subtitle">Marginal Loss Factors for NEM generator assets by financial year — tracking trends and degradation</p>

<div class="stats" id="stats"></div>

<div class="controls">
  <div class="tabs" id="tabs"></div>
  <div class="filters">
    <select id="regionFilter" style="display:none"><option value="">All Regions</option></select>
    <select id="typeFilter"><option value="">All Types</option></select>
    <select id="fuelFilter"><option value="">All Fuel Types</option></select>
    <input type="text" id="search" placeholder="Search DUID or station...">
    <label style="display:flex;align-items:center;gap:5px;font-size:0.82rem;color:var(--muted);cursor:pointer;white-space:nowrap">
      <input type="checkbox" id="showRetired"> Show retired DUIDs
    </label>
  </div>
</div>

<div class="actions" id="actions">
  <button class="action-btn" id="exportSelected" disabled>Export Selected to Excel</button>
  <button class="action-btn" id="clearSelection" style="display:none">Clear Selection</button>
  <span class="sel-count" id="selCount"></span>
</div>

<div class="loading" id="loading">Loading data...</div>

<div id="genSection" style="display:none">
  <h2 class="section-title" id="genTitle">Generators</h2>
  <div class="table-wrap"><table id="genTable"><thead id="genThead"></thead><tbody id="genTbody"></tbody></table></div>
</div>

<div id="battSection" style="display:none">
  <h2 class="section-title" id="battTitle">Battery Storage</h2>
  <div class="table-wrap"><table id="battTable"><thead id="battThead"></thead><tbody id="battTbody"></tbody></table></div>
</div>

<div class="downloads" id="downloads"></div>
<div class="footer" id="footer"></div>

<script>
const REGIONS = {NSW1:'NSW',QLD1:'QLD',VIC1:'VIC',SA1:'SA',TAS1:'TAS'};
const EXCEL_FILES = {NSW1:'NSW_mlf.xlsx',QLD1:'QLD_mlf.xlsx',VIC1:'VIC_mlf.xlsx',SA1:'SA_mlf.xlsx',TAS1:'TAS_mlf.xlsx'};

let allData = [];
let fyCols = [];       // standard FY columns (export)
let importCols = [];   // import FY columns
let draftCols = [];    // draft/indicative FY columns
let activeRegion = 'ALL';
let sortState = { gen: { col: null, dir: 'asc' }, batt: { col: null, dir: 'asc' } };
let selected = new Set();

function mlfColor(val) {
  if (val === '' || val === null || isNaN(val)) return '';
  const lo = 0.80, mid = 0.95, hi = 1.05;
  const v = Math.max(lo, Math.min(hi, val));
  let r, g, b;
  if (v <= mid) {
    const t = (v - lo) / (mid - lo);
    r = Math.round(248 + (255 - 248) * t);
    g = Math.round(105 + (235 - 105) * t);
    b = Math.round(107 + (132 - 107) * t);
  } else {
    const t = (v - mid) / (hi - mid);
    r = Math.round(255 + (99 - 255) * t);
    g = Math.round(235 + (190 - 235) * t);
    b = Math.round(132 + (123 - 132) * t);
  }
  return `rgb(${r},${g},${b})`;
}

function textColor(val) {
  if (val === '' || val === null || isNaN(val)) return '';
  return val >= 0.85 && val <= 1.02 ? '#1a1a1a' : '#e0e0e0';
}

function changeClass(val) {
  if (val === '' || val === null || isNaN(val)) return 'change-neutral';
  return val > 0 ? 'change-pos' : val < 0 ? 'change-neg' : 'change-neutral';
}

function getBaseRows() {
  let rows = allData;
  if (activeRegion !== 'ALL') {
    rows = rows.filter(r => r.REGIONID === activeRegion);
  } else {
    const regionVal = document.getElementById('regionFilter').value;
    if (regionVal) rows = rows.filter(r => r.REGIONID === regionVal);
  }
  return rows;
}

function getFiltered() {
  const type = document.getElementById('typeFilter').value;
  const fuel = document.getElementById('fuelFilter').value;
  const search = document.getElementById('search').value.toLowerCase();
  const showRetired = document.getElementById('showRetired').checked;
  let rows = getBaseRows();
  if (!showRetired) rows = rows.filter(r => r.STATUS !== 'Retired');
  if (type) rows = rows.filter(r => (r.DUID_TYPE || 'Unknown') === type);
  if (fuel) rows = rows.filter(r => r.FUEL_CATEGORY === fuel);
  if (search) rows = rows.filter(r =>
    (r.DUID || '').toLowerCase().includes(search) ||
    (r.STATION_NAME || '').toLowerCase().includes(search)
  );
  return rows;
}

function sortRows(rows, col, dir) {
  if (!col) return rows;
  return [...rows].sort((a, b) => {
    let va = a[col], vb = b[col];
    const na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) { va = na; vb = nb; }
    if (va === '' || va === undefined) return 1;
    if (vb === '' || vb === undefined) return -1;
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function renderStats() {
  const rows = getBaseRows();
  const showRetired = document.getElementById('showRetired').checked;
  const filtered = showRetired ? rows : rows.filter(r => r.STATUS !== 'Retired');

  const fuelOrder = ['Solar', 'Wind', 'Battery', 'Hydro', 'Fossil', 'Other Renewable'];
  const counts = {};
  filtered.forEach(r => {
    const fuel = r.FUEL_CATEGORY || 'Unknown';
    counts[fuel] = (counts[fuel] || 0) + 1;
  });

  const displayFuels = fuelOrder.filter(f => counts[f] > 0);
  Object.keys(counts).forEach(f => {
    if (!fuelOrder.includes(f) && counts[f] > 0) displayFuels.push(f);
  });

  document.getElementById('stats').innerHTML = displayFuels.map(fuel =>
    `<div class="stat-card"><div class="stat-label">${fuel}</div><div class="stat-value">${counts[fuel]}</div></div>`
  ).join('');
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'tab' + (activeRegion === 'ALL' ? ' active' : '');
  allBtn.textContent = 'All';
  allBtn.onclick = () => {
    activeRegion = 'ALL';
    document.getElementById('regionFilter').style.display = '';
    renderTabs(); renderStats(); renderTables();
  };
  container.appendChild(allBtn);

  for (const [id, name] of Object.entries(REGIONS)) {
    const btn = document.createElement('button');
    btn.className = 'tab' + (id === activeRegion ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      activeRegion = id;
      document.getElementById('regionFilter').style.display = 'none';
      document.getElementById('regionFilter').value = '';
      renderTabs(); renderStats(); renderTables();
    };
    container.appendChild(btn);
  }
}

function updateSelectionUI() {
  const n = selected.size;
  document.getElementById('exportSelected').disabled = n === 0;
  document.getElementById('clearSelection').style.display = n > 0 ? '' : 'none';
  document.getElementById('selCount').textContent = n > 0 ? `${n} asset${n > 1 ? 's' : ''} selected` : '';
}

function toggleSelect(duid) {
  if (selected.has(duid)) selected.delete(duid); else selected.add(duid);
  updateSelectionUI();
  const row = document.querySelector(`tr[data-duid="${duid}"]`);
  if (row) {
    row.classList.toggle('selected', selected.has(duid));
    const cb = row.querySelector('.cb');
    if (cb) cb.checked = selected.has(duid);
  }
}

function renderOneTable(opts) {
  const { rows: unsortedRows, theadId, tbodyId, tableId, wrapId, sectionId, titleId,
          titleText, sortKey, fyColumns, extraCols, extraLabels } = opts;

  const section = document.getElementById(sectionId);
  const thead = document.getElementById(theadId);
  const tbody = document.getElementById(tbodyId);

  if (unsortedRows.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  document.getElementById(titleId).textContent = `${titleText} (${unsortedRows.length})`;

  const ss = sortState[sortKey];
  const rows = sortRows(unsortedRows, ss.col, ss.dir);

  const showRegionCol = activeRegion === 'ALL';
  const metaCols = showRegionCol
    ? ['DUID', 'DUID_TYPE', 'STATION_NAME', 'REGIONID', 'FUEL_CATEGORY', 'CAPACITY_MW']
    : ['DUID', 'DUID_TYPE', 'STATION_NAME', 'FUEL_CATEGORY', 'CAPACITY_MW'];
  const metaLabels = showRegionCol
    ? ['DUID', 'Type', 'Station', 'Region', 'Fuel', 'MW']
    : ['DUID', 'Type', 'Station', 'Fuel', 'MW'];

  const allCols = [...metaCols, ...fyColumns, ...extraCols];
  const allLabels = [...metaLabels, ...fyColumns, ...extraLabels];

  const allChecked = rows.length > 0 && rows.every(r => selected.has(r.DUID));

  thead.innerHTML = '<tr><th><input type="checkbox" class="cb" data-selectall="' + sortKey + '" ' +
    (allChecked ? 'checked' : '') + '></th>' +
    allLabels.map((l, i) => {
      const col = allCols[i];
      const sortCls = col === ss.col ? (ss.dir === 'asc' ? 'sorted-asc' : 'sorted-desc') : '';
      const isDraft = col.includes('Draft');
      const isImport = col.includes('Import') && col.startsWith('FY');
      const headerCls = isDraft ? ' draft-header' : isImport ? ' import-header' : '';
      return `<th class="${sortCls}${headerCls}" data-col="${col}" data-sort-key="${sortKey}">${l}</th>`;
    }).join('') + '</tr>';

  // Select-all handler
  thead.querySelector('[data-selectall]').onchange = () => {
    const allSel = unsortedRows.every(r => selected.has(r.DUID));
    if (allSel) {
      unsortedRows.forEach(r => selected.delete(r.DUID));
    } else {
      unsortedRows.forEach(r => selected.add(r.DUID));
    }
    updateSelectionUI();
    renderTables();
  };

  // Sort handlers
  thead.querySelectorAll('th[data-col]').forEach(th => {
    th.onclick = () => {
      const col = th.dataset.col;
      const key = th.dataset.sortKey;
      const s = sortState[key];
      if (s.col === col) { s.dir = s.dir === 'asc' ? 'desc' : 'asc'; }
      else { s.col = col; s.dir = 'asc'; }
      renderTables();
    };
  });

  tbody.innerHTML = rows.map(row => {
    const duid = row.DUID || '';
    const isSelected = selected.has(duid);
    const isRetired = row.STATUS === 'Retired';
    const cells = [];

    cells.push(`<td><input type="checkbox" class="cb" ${isSelected ? 'checked' : ''} data-duid="${duid}"></td>`);

    const retiredBadge = isRetired ? ' <span class="badge-retired">retired</span>' : '';
    cells.push(`<td>${duid}${retiredBadge}</td>`);

    const typeVal = row.DUID_TYPE || 'Unknown';
    const typeCls = typeVal === 'Generator' ? 'type-generator'
      : typeVal === 'Network Load' ? 'type-network'
      : typeVal === 'Interconnector' ? 'type-interconnector'
      : typeVal === 'Scheduled Load' ? 'type-scheduled'
      : typeVal === 'Market Customer' ? 'type-customer'
      : 'type-unknown';
    cells.push(`<td><span class="type-badge ${typeCls}">${typeVal}</span></td>`);

    cells.push(`<td>${row.STATION_NAME || ''}</td>`);
    if (showRegionCol) {
      cells.push(`<td>${REGIONS[row.REGIONID] || row.REGIONID || ''}</td>`);
    }
    cells.push(`<td>${row.FUEL_CATEGORY || ''}</td>`);

    const cap = parseFloat(row.CAPACITY_MW);
    cells.push(`<td>${isNaN(cap) ? '' : cap.toFixed(0)}</td>`);

    // FY cells with heatmap
    fyColumns.forEach(fy => {
      const val = parseFloat(row[fy]);
      const isDraft = fy.includes('Draft');
      if (isNaN(val)) {
        cells.push(`<td class="mlf-cell${isDraft ? ' draft-cell' : ''}">-</td>`);
      } else {
        const bg = mlfColor(val);
        const fg = textColor(val);
        cells.push(`<td class="mlf-cell${isDraft ? ' draft-cell' : ''}" style="background:${bg};color:${fg}">${val.toFixed(4)}</td>`);
      }
    });

    // Extra cols (YoY)
    extraCols.forEach(col => {
      const val = parseFloat(row[col]);
      const isPct = col.includes('PCT');
      if (isNaN(val)) {
        cells.push(`<td class="change-neutral">-</td>`);
      } else {
        const cls = changeClass(val);
        const formatted = isPct
          ? (val > 0 ? '+' : '') + val.toFixed(2) + '%'
          : (val > 0 ? '+' : '') + val.toFixed(4);
        cells.push(`<td class="${cls}">${formatted}</td>`);
      }
    });

    const rowClass = [isSelected ? 'selected' : '', isRetired ? 'status-retired' : ''].filter(Boolean).join(' ');
    return `<tr data-duid="${duid}" class="${rowClass}">${cells.join('')}</tr>`;
  }).join('');

  // Checkbox click handlers
  tbody.querySelectorAll('.cb').forEach(cb => {
    cb.onchange = (e) => {
      e.stopPropagation();
      toggleSelect(cb.dataset.duid);
    };
  });

  updateSelectionUI();
}

function renderTables() {
  const allFiltered = getFiltered();
  const genRows = allFiltered.filter(r => r.FUEL_CATEGORY !== 'Battery');
  const battRows = allFiltered.filter(r => r.FUEL_CATEGORY === 'Battery');

  // Generator FY columns: standard + draft, no import
  const genFyCols = [...fyCols, ...draftCols];

  // Battery FY columns: interleave standard with import
  const battFyCols = [];
  fyCols.forEach(fy => {
    battFyCols.push(fy);
    const importCol = fy + ' Import';
    if (importCols.includes(importCol)) {
      battFyCols.push(importCol);
    }
  });
  draftCols.forEach(dc => battFyCols.push(dc));

  renderOneTable({
    rows: genRows,
    theadId: 'genThead', tbodyId: 'genTbody', tableId: 'genTable',
    wrapId: 'genTableWrap', sectionId: 'genSection', titleId: 'genTitle',
    titleText: 'Generators', sortKey: 'gen',
    fyColumns: genFyCols,
    extraCols: ['YOY_CHANGE', 'YOY_PCT_CHANGE'],
    extraLabels: ['YoY', 'YoY %']
  });

  renderOneTable({
    rows: battRows,
    theadId: 'battThead', tbodyId: 'battTbody', tableId: 'battTable',
    wrapId: 'battTableWrap', sectionId: 'battSection', titleId: 'battTitle',
    titleText: 'Battery Storage', sortKey: 'batt',
    fyColumns: battFyCols,
    extraCols: ['YOY_CHANGE', 'YOY_PCT_CHANGE', 'IMPORT_YOY_CHANGE', 'IMPORT_YOY_PCT_CHANGE'],
    extraLabels: ['YoY', 'YoY %', 'Import YoY', 'Import YoY %']
  });

  document.getElementById('loading').style.display = 'none';
}

function exportSelectedToExcel() {
  if (selected.size === 0) return;
  const selectedRows = allData.filter(r => selected.has(r.DUID));

  const allFyExport = [...fyCols, ...importCols, ...draftCols];
  const exportCols = ['DUID', 'DUID_TYPE', 'STATION_NAME', 'REGIONID', 'FUEL_CATEGORY',
                      'TECHNOLOGY', 'CAPACITY_MW', ...allFyExport, 'YOY_CHANGE', 'YOY_PCT_CHANGE',
                      'IMPORT_YOY_CHANGE', 'IMPORT_YOY_PCT_CHANGE'];
  const headers = ['DUID', 'Type', 'Station', 'Region', 'Fuel Type',
                    'Technology', 'Capacity (MW)', ...allFyExport, 'YoY Change', 'YoY %',
                    'Import YoY Change', 'Import YoY %'];

  const wsData = [headers];
  selectedRows.forEach(row => {
    wsData.push(exportCols.map(col => {
      const val = row[col];
      if (col === 'REGIONID') return REGIONS[val] || val || '';
      const num = parseFloat(val);
      return isNaN(num) ? (val || '') : num;
    }));
  });

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);

  ws['!cols'] = [
    {wch: 14}, {wch: 28}, {wch: 8}, {wch: 14},
    {wch: 22}, {wch: 12},
    ...allFyExport.map(() => ({wch: 10})),
    {wch: 11}, {wch: 9}, {wch: 14}, {wch: 12}
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Selected Assets');
  const filename = selected.size === 1
    ? `MLF_${selectedRows[0].DUID}.xlsx`
    : `MLF_${selected.size}_assets.xlsx`;
  XLSX.writeFile(wb, filename);
}

function renderDownloads() {
  const container = document.getElementById('downloads');
  container.innerHTML = '<strong style="width:100%;margin-bottom:4px">Download Excel:&nbsp;</strong>' +
    Object.entries(REGIONS).map(([id, name]) =>
      `<a class="dl-btn" href="outputs/${EXCEL_FILES[id]}" download>${name}</a>`
    ).join('') +
    `<a class="dl-btn" href="outputs/summary.csv" download>CSV (All)</a>`;
}

function populateFilters() {
  const types = [...new Set(allData.map(r => r.DUID_TYPE || 'Unknown').filter(Boolean))].sort();
  const typeSel = document.getElementById('typeFilter');
  types.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t;
    typeSel.appendChild(opt);
  });
  typeSel.onchange = () => { renderStats(); renderTables(); };

  const fuels = [...new Set(allData.map(r => r.FUEL_CATEGORY).filter(Boolean))].sort();
  const fuelSel = document.getElementById('fuelFilter');
  fuels.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f; opt.textContent = f;
    fuelSel.appendChild(opt);
  });
  fuelSel.onchange = () => { renderStats(); renderTables(); };

  const regionSel = document.getElementById('regionFilter');
  Object.entries(REGIONS).forEach(([id, name]) => {
    const opt = document.createElement('option');
    opt.value = id; opt.textContent = name;
    regionSel.appendChild(opt);
  });
  regionSel.onchange = () => { renderStats(); renderTables(); };
}

document.getElementById('search').oninput = () => renderTables();
document.getElementById('showRetired').onchange = () => { renderStats(); renderTables(); };
document.getElementById('exportSelected').onclick = exportSelectedToExcel;
document.getElementById('clearSelection').onclick = () => {
  selected.clear();
  updateSelectionUI();
  renderTables();
};

Papa.parse('outputs/summary.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    allData = results.data;
    const allFyKeys = Object.keys(allData[0] || {}).filter(k => k.startsWith('FY')).sort();
    fyCols = allFyKeys.filter(k => !k.includes('Draft') && !k.includes('Import'));
    importCols = allFyKeys.filter(k => k.includes('Import'));
    draftCols = allFyKeys.filter(k => k.includes('Draft'));

    const latestFy = fyCols[fyCols.length - 1];
    if (latestFy) {
      sortState.gen.col = latestFy;
      sortState.batt.col = latestFy;
    }

    document.getElementById('footer').textContent =
      `${allData.length} generators tracked \u00B7 FY${fyCols[0]?.slice(2) || '?'} to FY${fyCols[fyCols.length-1]?.slice(2) || '?'} \u00B7 Source: AEMO DUDETAILSUMMARY via MMSDM Archive`;

    populateFilters();
    renderTabs();
    renderStats();
    renderTables();
    renderDownloads();
  },
  error: function() {
    document.getElementById('loading').textContent = 'Failed to load data. Check that outputs/summary.csv exists.';
  }
});
</script>
</body>
